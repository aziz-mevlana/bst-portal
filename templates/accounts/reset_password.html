{% extends 'base.html' %}
{% load static %}

{% block title %}BST Portal | Yeni Şifre{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[50vh] sm:min-h-[60vh] lg:min-h-[70vh] px-4 py-8 sm:py-12">
    <div class="w-full max-w-sm sm:max-w-md p-5 sm:p-8 color-page rounded-xl shadow-lg">
        <div class="text-center mb-5 sm:mb-6">
            <div class="mx-auto w-14 h-14 sm:w-16 sm:h-16 bg-blue-600 rounded-full flex items-center justify-center mb-4">
                <svg class="w-7 h-7 sm:w-8 sm:h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
            <h2 class="text-xl sm:text-2xl font-bold mb-2">Yeni Şifre Belirle</h2>
            <p class="text-sm sm:text-base text-gray-400">Yeni şifrenizi girin.</p>
        </div>

        <form method="post" class="flex flex-col gap-4">
            {% csrf_token %}
            <div>
                <label for="password_1" class="block text-sm font-medium mb-1">Yeni Şifre</label>
                <input type="password" name="password_1" id="password_1" class="project-form-input w-full px-3 py-2.5 sm:py-2 rounded-lg text-sm sm:text-base" required autofocus minlength="6">
            </div>
            <div>
                <label for="password_2" class="block text-sm font-medium mb-1">Yeni Şifre (Tekrar)</label>
                <input type="password" name="password_2" id="password_2" class="project-form-input w-full px-3 py-2.5 sm:py-2 rounded-lg text-sm sm:text-base" required minlength="6">
            </div>
            <button type="submit" class="w-full mt-1 py-2.5 sm:py-2 px-4 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm sm:text-base transition-colors">
                Şifreyi Sıfırla
            </button>
        </form>

        <p class="mt-5 text-center text-sm text-gray-400">
            <a href="{% url 'accounts:login' %}" class="text-blue-500 font-medium hover:underline">&larr; Giriş sayfasına dön</a>
        </p>
    </div>
</div>
{% endblock %}
