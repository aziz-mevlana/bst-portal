{% extends 'base.html' %}
{% load static %}

{% block title %}BST Portal | Şifremi Unuttum{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[50vh] sm:min-h-[60vh] lg:min-h-[70vh] px-4 py-8 sm:py-12">
    <div class="w-full max-w-sm sm:max-w-md p-5 sm:p-8 color-page rounded-xl shadow-lg">
        <div class="text-center mb-5 sm:mb-6">
            <div class="mx-auto w-14 h-14 sm:w-16 sm:h-16 bg-blue-600 rounded-full flex items-center justify-center mb-4">
                <svg class="w-7 h-7 sm:w-8 sm:h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
                </svg>
            </div>
            <h2 class="text-xl sm:text-2xl font-bold mb-2">Şifremi Unuttum</h2>
            <p class="text-sm sm:text-base text-gray-400">Kayıtlı email adresinizi girin, size şifre sıfırlama kodu gönderelim.</p>
        </div>

        <form method="post" class="flex flex-col gap-4">
            {% csrf_token %}
            <div>
                <label for="email" class="block text-sm font-medium mb-1">Email Adresi</label>
                <input type="email" name="email" id="email" class="project-form-input w-full px-3 py-2.5 sm:py-2 rounded-lg text-sm sm:text-base" required autofocus>
            </div>
            <button type="submit" class="w-full mt-1 py-2.5 sm:py-2 px-4 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm sm:text-base transition-colors">
                Kod Gönder
            </button>
        </form>

        <p class="mt-5 text-center text-sm text-gray-400">
            <a href="{% url 'accounts:login' %}" class="text-blue-500 font-medium hover:underline">&larr; Giriş sayfasına dön</a>
        </p>
    </div>
</div>
{% endblock %}
