{% extends 'base.html' %}
{% load static %}

{% block title %}BST Akademi | Email Doğrulama{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[50vh] sm:min-h-[60vh] lg:min-h-[70vh] px-4 py-8 sm:py-12">
    <div class="w-full max-w-sm sm:max-w-md p-5 sm:p-8 color-page rounded-xl shadow-lg">
        <div class="text-center mb-5 sm:mb-6">
            <div class="mx-auto w-14 h-14 sm:w-16 sm:h-16 bg-blue-600 rounded-full flex items-center justify-center mb-4">
                <svg class="w-7 h-7 sm:w-8 sm:h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                </svg>
            </div>
            <h2 class="text-xl sm:text-2xl font-bold mb-2">Email Doğrulama</h2>
            <p class="text-sm sm:text-base text-gray-400">
                <span class="font-medium text-white">{{ email }}</span> adresine gönderilen 6 haneli doğrulama kodunu girin.
            </p>
        </div>

        <form method="post" class="flex flex-col gap-5">
            {% csrf_token %}
            <div class="flex justify-center gap-2 sm:gap-3" id="code-inputs">
                <input type="text" name="code_1" maxlength="1" inputmode="numeric" pattern="[0-9]"
                    class="code-input w-11 h-12 sm:w-13 sm:h-14 text-center text-xl sm:text-2xl font-bold project-form-input rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
                    required autocomplete="off">
                <input type="text" name="code_2" maxlength="1" inputmode="numeric" pattern="[0-9]"
                    class="code-input w-11 h-12 sm:w-13 sm:h-14 text-center text-xl sm:text-2xl font-bold project-form-input rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
                    required autocomplete="off">
                <input type="text" name="code_3" maxlength="1" inputmode="numeric" pattern="[0-9]"
                    class="code-input w-11 h-12 sm:w-13 sm:h-14 text-center text-xl sm:text-2xl font-bold project-form-input rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
                    required autocomplete="off">
                <input type="text" name="code_4" maxlength="1" inputmode="numeric" pattern="[0-9]"
                    class="code-input w-11 h-12 sm:w-13 sm:h-14 text-center text-xl sm:text-2xl font-bold project-form-input rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
                    required autocomplete="off">
                <input type="text" name="code_5" maxlength="1" inputmode="numeric" pattern="[0-9]"
                    class="code-input w-11 h-12 sm:w-13 sm:h-14 text-center text-xl sm:text-2xl font-bold project-form-input rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
                    required autocomplete="off">
                <input type="text" name="code_6" maxlength="1" inputmode="numeric" pattern="[0-9]"
                    class="code-input w-11 h-12 sm:w-13 sm:h-14 text-center text-xl sm:text-2xl font-bold project-form-input rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
                    required autocomplete="off">
            </div>

            <button type="submit" class="w-full py-2.5 sm:py-3 px-6 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm sm:text-base transition-colors">
                Doğrula
            </button>
        </form>

        <div class="mt-5 text-center">
            <p class="text-sm text-gray-400">
                Kod gelmedi mi?
                <a href="{% url 'accounts:resend_verification' %}" class="text-blue-500 font-medium hover:underline">Tekrar Gönder</a>
            </p>
            <p class="mt-3 text-sm text-gray-400">
                <a href="{% url 'accounts:register' %}" class="text-blue-500 font-medium hover:underline">&larr; Kayıt formuna dön</a>
            </p>
        </div>
    </div>
</div>

<style>
    .code-input {
        width: 2.75rem;
    }
    @media (min-width: 640px) {
        .code-input {
            width: 3.25rem;
        }
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const inputs = document.querySelectorAll('.code-input');

        inputs.forEach((input, index) => {
            input.addEventListener('input', function(e) {
                const value = e.target.value;
                if (value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });

            input.addEventListener('paste', function(e) {
                e.preventDefault();
                const paste = (e.clipboardData || window.clipboardData).getData('text').trim();
                if (/^\d{6}$/.test(paste)) {
                    inputs.forEach((inp, i) => {
                        inp.value = paste[i] || '';
                    });
                    inputs[5].focus();
                }
            });
        });

        inputs[0].focus();
    });
</script>
{% endblock %}
