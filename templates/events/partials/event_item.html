{% for event in events %}
<a href="{% url 'events:event_detail' event.id %}" class="project-list-card rounded-xl shadow-lg hover:shadow-2xl transition p-6 flex flex-col justify-between color-page">
    <div>
        <div class="flex items-center gap-2 mb-2">
            <span class="dynamic-tag" 
                  style="--tag-bg: #3b82f620; --tag-color: #3b82f6; --tag-border: #3b82f640;">
                {{ event.get_event_type_display }}
            </span>
            <span class="dynamic-tag" 
                  style="--tag-bg: #6b728020; --tag-color: #6b7280; --tag-border: #6b728040;">
                {{ event.location }}
            </span>
        </div>
        <h3 class="text-xl font-bold mb-2">{{ event.title }}</h3>
        <p class="mb-4 line-clamp-3">{{ event.description|truncatewords:25 }}</p>
    </div>
    <div class="flex items-center justify-between text-sm mt-4">
        <span class="flex items-center gap-1">
            <span class="flex items-center gap-1"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.5 19.5a7.5 7.5 0 1115 0v.75A2.25 2.25 0 0117.25 22.5h-10.5A2.25 2.25 0 014.5 20.25V19.5z" /></svg>{{ event.created_by.get_full_name }}</span>
        </span>
        <span class="flex items-center gap-1">
            {{ event.start_date|date:"d.m.Y" }}
        </span>
    </div>
</a>
{% endfor %}
